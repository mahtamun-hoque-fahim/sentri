<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentri</title>
  <style>
    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ─────────────────────────────────────── */
    :root {
      --green:    #006341;
      --dark-g:   #004D32;
      --text:     #1A1F1E;
      --sub:      #667085;
      --muted:    #E8EDEB;
      --bg:       #F7F9F8;
      --surface:  #FFFFFF;
      --danger:   #D93025;
      --yellow:   #F9D74C;
      --radius:   12px;
      --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
      --mono:     'Cascadia Code', 'Fira Code', monospace;
    }

    body {
      width: 360px;
      min-height: 480px;
      max-height: 600px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Screens ─────────────────────────────────────── */
    .screen { display: none; flex-direction: column; height: 100%; }
    .screen.active { display: flex; }

    /* ── Header ─────────────────────────────────────── */
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--muted);
    }
    .logo {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, var(--green), var(--dark-g));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 12px; flex-shrink: 0;
    }
    .header-title { font-size: 15px; font-weight: 600; color: var(--green); flex: 1; }
    .header-site  { font-size: 11px; color: var(--sub); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lock-btn {
      background: none; border: none; cursor: pointer;
      color: var(--sub); font-size: 16px; padding: 4px;
      border-radius: 6px; transition: background 0.15s;
    }
    .lock-btn:hover { background: var(--muted); }

    /* ── Search ─────────────────────────────────────── */
    .search-wrap {
      padding: 10px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--muted);
    }
    .search-input {
      width: 100%; padding: 7px 12px 7px 32px;
      border: 1px solid var(--muted); border-radius: 8px;
      background: var(--bg); font-size: 12px; outline: none;
      font-family: var(--font);
    }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; }

    /* ── Item list ──────────────────────────────────── */
    .items-list {
      flex: 1; overflow-y: auto;
      padding: 8px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .items-list::-webkit-scrollbar { width: 4px; }
    .items-list::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 99px; }

    .item-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--muted);
      cursor: pointer; transition: all 0.15s;
    }
    .item-row:hover { border-color: var(--green); background: rgba(0,99,65,0.03); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,99,65,0.08); }
    .item-icon { width: 34px; height: 34px; border-radius: 8px; background: rgba(0,99,65,0.08); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .item-icon img { width: 18px; height: 18px; border-radius: 4px; }
    .item-info { flex: 1; min-width: 0; }
    .item-title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub   { font-size: 11px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .fill-btn {
      padding: 5px 10px; border-radius: 7px; font-size: 11px; font-weight: 600;
      background: linear-gradient(135deg, var(--green), var(--dark-g));
      color: #fff; border: none; cursor: pointer; white-space: nowrap;
      transition: opacity 0.15s;
    }
    .fill-btn:hover { opacity: 0.88; }

    /* ── Footer ─────────────────────────────────────── */
    .footer {
      padding: 10px 12px;
      background: var(--surface);
      border-top: 1px solid var(--muted);
      display: flex; gap: 6px;
    }
    .footer-btn {
      flex: 1; padding: 8px;
      border-radius: 8px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--muted);
      background: var(--bg); cursor: pointer;
      color: var(--sub); transition: all 0.15s;
      text-align: center;
    }
    .footer-btn:hover { background: var(--muted); color: var(--text); }

    /* ── Unlock screen ──────────────────────────────── */
    .unlock-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 20px; gap: 16px;
    }
    .unlock-icon { font-size: 40px; }
    .unlock-title { font-size: 17px; font-weight: 600; text-align: center; }
    .unlock-sub   { font-size: 12px; color: var(--sub); text-align: center; line-height: 1.5; }
    .field-group { width: 100%; display: flex; flex-direction: column; gap: 3px; }
    .field-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--sub); }
    .field-input {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 1px solid var(--muted); background: var(--bg);
      font-size: 12px; outline: none; font-family: var(--font);
      transition: box-shadow 0.15s;
    }
    .field-input:focus { box-shadow: 0 0 0 3px rgba(0,99,65,0.18); }
    .mono-input { font-family: var(--mono); letter-spacing: 0.05em; font-size: 11px; }
    .primary-btn {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, var(--green), var(--dark-g));
      color: #fff; border: none; border-radius: 9px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    .primary-btn:hover { opacity: 0.9; }
    .primary-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .error-msg { width: 100%; padding: 8px 12px; border-radius: 8px; font-size: 12px; text-align: center; background: rgba(217,48,37,0.07); color: var(--danger); border: 1px solid rgba(217,48,37,0.2); }

    /* ── Detail screen ──────────────────────────────── */
    .detail-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .detail-card { background: var(--surface); border-radius: 10px; border: 1px solid var(--muted); overflow: hidden; }
    .detail-field { padding: 10px 14px; display: flex; flex-direction: column; gap: 3px; border-bottom: 1px solid var(--bg); }
    .detail-field:last-child { border-bottom: none; }
    .detail-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--sub); }
    .detail-value-row { display: flex; align-items: center; gap: 8px; }
    .detail-value { flex: 1; font-size: 13px; word-break: break-all; }
    .detail-value.blurred { filter: blur(4px); user-select: none; }
    .copy-btn {
      padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 600;
      border: 1px solid var(--muted); background: transparent;
      cursor: pointer; color: var(--sub); white-space: nowrap; transition: all 0.15s;
    }
    .copy-btn.copied { border-color: var(--green); color: var(--green); background: rgba(0,99,65,0.07); }
    .show-btn { font-size: 10px; color: var(--sub); cursor: pointer; background: none; border: none; }

    /* ── Empty state ─────────────────────────────────── */
    .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 24px; color: var(--sub); text-align: center; }
    .empty-icon { font-size: 32px; }
    .empty-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .empty-sub { font-size: 12px; line-height: 1.5; }

    /* ── Animations ─────────────────────────────────── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.25s ease both; }
  </style>
</head>
<body>

  <!-- ── Unlock Screen ───────────────────────────────── -->
  <div id="screen-unlock" class="screen active">
    <div class="header">
      <div class="logo">S</div>
      <span class="header-title">Sentri</span>
    </div>
    <div class="unlock-body">
      <div class="unlock-icon">🔐</div>
      <p class="unlock-title">Unlock your vault</p>
      <p class="unlock-sub">Enter your credentials to decrypt and autofill passwords.</p>

      <div class="field-group">
        <label class="field-label">Email</label>
        <input id="u-email" class="field-input" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field-group">
        <label class="field-label">Master Password</label>
        <input id="u-password" class="field-input" type="password" placeholder="Your master password" />
      </div>
      <div class="field-group">
        <label class="field-label">Secret Key</label>
        <input id="u-secret" class="field-input mono-input" type="text" placeholder="XXXX-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX" />
      </div>

      <div id="unlock-error" class="error-msg" style="display:none;"></div>
      <button id="unlock-btn" class="primary-btn">Unlock Vault</button>
    </div>
  </div>

  <!-- ── Vault List Screen ───────────────────────────── -->
  <div id="screen-vault" class="screen">
    <div class="header">
      <div class="logo">S</div>
      <div style="flex:1; min-width:0;">
        <div class="header-title">Sentri</div>
        <div class="header-site" id="current-site">sentri.app</div>
      </div>
      <button class="lock-btn" id="lock-btn" title="Lock vault">🔒</button>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search-input" class="search-input" placeholder="Search vault…" style="padding-left: 32px;" />
    </div>

    <div id="items-list" class="items-list"></div>

    <div class="footer">
      <button class="footer-btn" id="btn-open-vault">Open Vault ↗</button>
      <button class="footer-btn" id="btn-new-item">+ New Item</button>
      <button class="footer-btn" id="btn-generator">⚡ Generate</button>
    </div>
  </div>

  <!-- ── Item Detail Screen ─────────────────────────── -->
  <div id="screen-detail" class="screen">
    <div class="header">
      <button id="back-btn" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--sub);padding:2px 6px 2px 0;">‹</button>
      <div class="logo" id="detail-icon">🔑</div>
      <div style="flex:1;min-width:0;">
        <div class="header-title" id="detail-title" style="font-size:13px;">Item</div>
        <div class="header-site" id="detail-type">Login</div>
      </div>
      <button id="autofill-btn" class="fill-btn">Autofill</button>
    </div>
    <div id="detail-body" class="detail-body"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
